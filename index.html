<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TriLife</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Figtree','Helvetica Neue',sans-serif;background:#F8FAFC;color:#0F172A;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:4px}
.card{background:#fff;border:1px solid #F1F5F9;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .18s}
.card:hover{box-shadow:0 6px 20px rgba(0,0,0,.07);transform:translateY(-1px)}
.btn{cursor:pointer;font-family:inherit;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;user-select:none}
.btn:active{transform:scale(.97)}
.check{cursor:pointer;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check:hover{transform:scale(1.12)}
input,select{font-family:inherit;outline:none}
input:focus,select:focus{border-color:#2563EB!important}
.fade{animation:fadeUp .22s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.overlay{animation:ov .15s ease;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
@keyframes ov{from{opacity:0}to{opacity:1}}
.modal{animation:mo .2s ease;background:#fff;border-radius:18px;padding:24px;width:100%;max-width:420px;box-shadow:0 32px 64px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
@keyframes mo{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;outline:none;cursor:pointer;width:100%;background:#E2E8F0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;cursor:pointer;border:none}
.prog{transition:width .5s cubic-bezier(.4,0,.2,1)}
.del{background:none;border:none;cursor:pointer;color:#EF4444;opacity:.2;font-size:14px;transition:opacity .15s;padding:0 2px;font-family:inherit}
.del:hover{opacity:1}
.header{background:#fff;border-bottom:1px solid #F1F5F9;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tabbar{background:#fff;border-bottom:1px solid #F1F5F9;display:flex;padding:0 16px;overflow-x:auto;position:sticky;top:56px;z-index:99}
.tabbar::-webkit-scrollbar{height:0}
.tab{padding:11px 16px;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2.5px solid transparent;color:#94A3B8;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.main{max-width:860px;margin:0 auto;padding:22px 16px}
.fl{font-size:10px;font-weight:700;color:#94A3B8;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #E2E8F0;font-size:13px;color:#0F172A;background:#fff;font-family:inherit;outline:none}
.mr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ma{display:flex;gap:8px;margin-top:4px}
.cb{flex:1;padding:11px;border-radius:9px;border:1.5px solid #E2E8F0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#64748B}
.sb{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid #F8FAFC}
.tgl{width:36px;height:20px;border-radius:99px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tk{width:14px;height:14px;border-radius:99px;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.bdg{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700}
</style>
</head>
<body>
<div id="toast" style="display:none;position:fixed;top:18px;right:18px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:fadeUp .2s ease"></div>
<div class="header">
  <div style="display:flex;align-items:center;gap:9px">
    <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2563EB,#7C3AED);display:flex;align-items:center;justify-content:center;font-size:15px">⚡</div>
    <span style="font-family:'Playfair Display',serif;font-size:19px">TriLife</span>
  </div>
  <div id="nArea"><button class="btn" onclick="askNotif()" style="font-size:11px;padding:6px 11px;border-radius:7px;font-weight:600;background:#FFFBEB;border:1px solid #FDE68A;color:#92400E">🔔 Enable Reminders</button></div>
</div>
<div class="tabbar" id="tabbar"></div>
<div class="main" id="main"></div>
<div id="mods"></div>
<script>
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const SEC={
  athlete: {label:'Athlete',     icon:'🏃',color:'#059669',light:'#ECFDF5'},
  school:  {label:'School',      icon:'📚',color:'#2563EB',light:'#EFF6FF'},
  work:    {label:'Work',        icon:'💼',color:'#D97706',light:'#FFFBEB'},
  reserve: {label:'Reserve Duty',icon:'🎖️',color:'#7C3AED',light:'#F5F3FF'},
  personal:{label:'Personal',    icon:'🌿',color:'#DB2777',light:'#FDF2F8'},
  goals:   {label:'Goals',       icon:'🎯',color:'#0891B2',light:'#ECFEFF'},
};
const TABS=[
  {k:'athlete', icon:'🏃',label:'Athlete',     col:'#059669'},
  {k:'school',  icon:'📚',label:'School',       col:'#2563EB'},
  {k:'work',    icon:'💼',label:'Work',         col:'#D97706'},
  {k:'reserve', icon:'🎖️',label:'Reserve Duty', col:'#7C3AED'},
  {k:'personal',icon:'🌿',label:'Personal',     col:'#DB2777'},
  {k:'goals',   icon:'🎯',label:'Goals',        col:'#0891B2'},
];
let S={
  tab:'athlete',
  lastMonday:monday(),
  workouts:[
    {id:1,name:'Morning Run',    unit:'km',planned:10,done:0,day:'Mon',time:'06:30',reminder:true},
    {id:2,name:'Cycling Session',unit:'km',planned:30,done:0,day:'Wed',time:'07:00',reminder:true},
    {id:3,name:'Long Run',       unit:'km',planned:15,done:0,day:'Sat',time:'07:00',reminder:true},
  ],
  subjects:{
    school:[
      {id:1,name:'Statistics',color:'#2563EB',subs:[{id:11,title:'Problem Set',   dow:0,time:'23:59',done:false}]},
      {id:2,name:'Literature',color:'#7C3AED',subs:[{id:12,title:'Reading Summary',dow:2,time:'23:59',done:false}]},
      {id:3,name:'Biology',   color:'#059669',subs:[{id:13,title:'Lab Report',    dow:4,time:'17:00',done:false}]},
    ],
    work:[{id:1,name:'My Job',       color:'#D97706',subs:[{id:11,title:'Weekly Report',dow:4,time:'17:00',done:false}]}],
    reserve:[{id:1,name:'Reserve Unit',color:'#7C3AED',subs:[{id:11,title:'Monthly Drill',dow:3,time:'08:00',done:false}]}],
  },
  goals:[
    {id:1,type:'milestone',title:'Run a Half Marathon',   emoji:'🏅',targetDate:'2026-06-01',done:false},
    {id:2,type:'streak',   title:'Sleep 8hrs every night',emoji:'😴',streakTarget:30,streakDone:7,done:false},
  ],
  tasks:[{id:1,section:'personal',title:'Evening Meditation',cat:'Wellness',date:'2026-03-12',time:'21:00',priority:'Low',done:false}],
  catchup:[
    {id:1,subject:'Statistics',topic:'Week 3 – Regression',date:'2026-03-08',done:false},
    {id:2,subject:'Biology',   topic:'Lab 2 – Cell Division', date:'2026-03-05',done:false},
  ],
};
let rTimers=[],notifPerm=Notification?.permission||'default',M={};

function monday(){const d=new Date();d.setHours(0,0,0,0);const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return d.toISOString().split('T')[0];}
function today(){return new Date().toISOString().split('T')[0];}
function nextDow(dow){const t=new Date();t.setHours(0,0,0,0);const td=(t.getDay()+6)%7;let diff=dow-td;if(diff<0)diff+=7;const d=new Date(t);d.setDate(d.getDate()+diff);return d.toISOString().split('T')[0];}
function due(ds){const n=new Date();n.setHours(0,0,0,0);const d=Math.ceil((new Date(ds+'T00:00:00')-n)/86400000);if(d<0)return{l:`${Math.abs(d)}d ago`,c:'#9CA3AF'};if(d===0)return{l:'Today',c:'#D97706'};if(d===1)return{l:'Tomorrow',c:'#059669'};if(d<=3)return{l:`In ${d}d`,c:'#2563EB'};return{l:`In ${d}d`,c:'#6B7280'};}
function daysNum(ds){const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(ds+'T00:00:00')-n)/86400000);}
function fd(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function ft(ts){if(!ts)return'';const[h,m]=ts.split(':');const hr=parseInt(h);return`${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`;}
function uid(){return Date.now()+Math.floor(Math.random()*1e6);}

function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.style.background=type==='err'?'#DC2626':type==='info'?'#6B7280':'#059669';el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3000);}

async function askNotif(){const p=await Notification.requestPermission();notifPerm=p;if(p==='granted'){toast('🔔 Reminders enabled!');document.getElementById('nArea').innerHTML='<span style="font-size:11px;color:#059669;font-weight:600">🔔 On</span>';scheduleR();}else toast('Permission denied','err');}

function scheduleR(){rTimers.forEach(clearTimeout);rTimers=[];if(notifPerm!=='granted')return;S.workouts.filter(w=>w.reminder&&w.time).forEach(w=>{const ds=nextDow(DAYS.indexOf(w.day));const ms=new Date(`${ds}T${w.time}`).getTime();[1800000,300000].forEach(off=>{const f=ms-off;if(f>Date.now())rTimers.push(setTimeout(()=>new Notification(`🏃 ${w.name}`,{body:`${w.planned}${w.unit} planned · ${off===1800000?'30 min':'5 min'} to go`}),f-Date.now()));});});}

function checkReset(){const m=monday();if(m!==S.lastMonday){S.workouts=S.workouts.map(w=>({...w,done:0}));S.lastMonday=m;toast('🔄 Workouts reset for the new week!');}}
function render(){checkReset();renderTabs();renderMain();}
function setTab(k){S.tab=k;render();}

function renderTabs(){document.getElementById('tabbar').innerHTML=TABS.map(t=>`<button class="tab" onclick="setTab('${t.k}')" style="color:${S.tab===t.k?t.col:'#94A3B8'};font-weight:${S.tab===t.k?700:500};border-bottom-color:${S.tab===t.k?t.col:'transparent'}">${t.icon} ${t.label}</button>`).join('');}

function renderMain(){const el=document.getElementById('main');if(S.tab==='athlete')el.innerHTML=rAthlete();else if(['school','work','reserve'].includes(S.tab))el.innerHTML=rPanel(S.tab);else if(S.tab==='personal')el.innerHTML=rPersonal();else el.innerHTML=rGoals();}

// ── Athlete ──
function rAthlete(){
  const tP=S.workouts.reduce((s,w)=>s+Number(w.planned),0),tD=S.workouts.reduce((s,w)=>s+Number(w.done),0),pct=tP?Math.round(tD/tP*100):0,bc=pct>=80?'#059669':pct>=50?'#D97706':'#EF4444';
  return`<div class="fade">
    <div class="card" style="padding:20px 22px;margin-bottom:18px;border-left:4px solid #059669">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div><div style="font-size:10px;font-weight:700;color:#059669;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">This Week</div>
          <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700">${tD}<span style="font-size:14px;color:#94A3B8;font-weight:400">/${tP} km</span></div>
          <div style="font-size:11px;color:#94A3B8;margin-top:2px">Resets every Monday 🔄</div></div>
        <div style="text-align:right"><div style="font-size:34px;font-weight:800;color:${bc};font-family:'Playfair Display',serif">${pct}%</div><div style="font-size:11px;color:#94A3B8">of weekly goal</div></div>
      </div>
      <div style="background:#F1F5F9;border-radius:99px;height:7px;overflow:hidden"><div class="prog" style="height:100%;width:${pct}%;background:${bc};border-radius:99px"></div></div>
    </div>
    ${S.workouts.map((w,i)=>{const wp=w.planned?Math.round(w.done/w.planned*100):0,col=wp>=100?'#059669':wp>=60?'#D97706':'#2563EB';return`
    <div class="card fade" style="padding:16px 18px;margin-bottom:10px;animation-delay:${i*.05}s">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div><div style="font-size:14px;font-weight:700;margin-bottom:2px">${w.name}</div><div style="font-size:11px;color:#94A3B8">${w.day}${w.time?' · '+ft(w.time):''}${w.reminder?' 🔔':''}</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right"><div style="font-size:22px;font-weight:800;color:${col}">${w.done}<span style="font-size:12px;color:#94A3B8;font-weight:500">/${w.planned}${w.unit}</span></div><div style="font-size:10px;font-weight:700;color:${col}">${wp>=100?'✓ Complete':wp+'%'}</div></div>
          <button class="btn" onclick="editW(${w.id})" style="font-size:11px;padding:5px 10px;border-radius:7px;background:#F8FAFC;border:1px solid #E2E8F0;color:#64748B;font-weight:600">Edit</button>
          <button class="del" onclick="delW(${w.id})">✕</button>
        </div>
      </div>
      <div style="background:#F1F5F9;border-radius:99px;height:5px;overflow:hidden;margin-bottom:10px"><div class="prog" style="height:100%;width:${Math.min(wp,100)}%;background:${col};border-radius:99px"></div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:#94A3B8;white-space:nowrap;flex-shrink:0">Log ${w.unit}:</span>
        <input type="range" min="0" max="${w.planned}" step="0.5" value="${w.done}" oninput="logD(${w.id},this.value)" style="flex:1;accent-color:${col}"/>
        <input type="number" min="0" max="${w.planned}" step="0.5" value="${w.done}" onchange="logD(${w.id},this.value)" style="width:54px;padding:5px 8px;border-radius:7px;border:1.5px solid #E2E8F0;font-size:13px;text-align:center;font-family:inherit"/>
        <span style="font-size:12px;color:#94A3B8;flex-shrink:0">${w.unit}</span>
      </div>
    </div>`;}).join('')}
    <button class="btn" onclick="addW()" style="width:100%;padding:12px;border-radius:10px;background:#ECFDF5;border:2px dashed #6EE7B7;color:#059669;font-size:13px;font-weight:700;justify-content:center;margin-top:4px">+ Add Workout</button>
  </div>`;}

function logD(id,v){S.workouts=S.workouts.map(w=>w.id===id?{...w,done:Math.max(0,Math.min(Number(v),w.planned))}:w);renderMain();}
function delW(id){S.workouts=S.workouts.filter(w=>w.id!==id);scheduleR();render();toast('Removed','info');}

// ── Subject Panel ──
function rPanel(type){
  const sec=SEC[type],subs=S.subjects[type];
  const label=type==='school'?'Subject':type==='work'?'Department':'Unit';
  const subLabel=type==='school'?'Submission':type==='work'?'Recurring Task':'Recurring Duty';
  const cards=subs.map((subj,i)=>{
    const dc=subj.subs.filter(s=>s.done).length,tot=subj.subs.length,pct=tot?Math.round(dc/tot*100):0;
    const rows=subj.subs.map(sub=>{const ds=nextDow(sub.dow),d=due(ds);return`
      <div class="sb" style="opacity:${sub.done?.5:1};background:${sub.done?'#FAFAFA':'#fff'}">
        <div class="check" onclick="togSub('${type}',${subj.id},${sub.id})" style="width:18px;height:18px;border-radius:5px;border:${sub.done?'none':'2px solid '+subj.color};background:${sub.done?subj.color:'transparent'}">${sub.done?'<span style="color:#fff;font-size:10px;font-weight:700">✓</span>':''}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;text-decoration:${sub.done?'line-through':'none'};color:${sub.done?'#94A3B8':'#0F172A'};margin-bottom:1px">${sub.title}</div><div style="font-size:11px;color:#94A3B8">${DAYS[sub.dow]} · ${ft(sub.time)}</div></div>
        <div style="font-size:11px;font-weight:700;color:${d.c};flex-shrink:0">${d.l}</div>
        <button class="del" onclick="delSub('${type}',${subj.id},${sub.id})">✕</button>
      </div>`;}).join('');
    return`<div class="card fade" style="margin-bottom:12px;overflow:hidden;animation-delay:${i*.05}s">
      <div style="padding:14px 16px;border-left:4px solid ${subj.color}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${tot?10:0}px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:9px;height:9px;border-radius:99px;background:${subj.color}"></div>
            <span style="font-size:14px;font-weight:700">${subj.name}</span>
            <span class="bdg" style="background:${subj.color}18;color:${subj.color}">${dc}/${tot}</span>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn" onclick="addSub('${type}',${subj.id})" style="font-size:11px;padding:5px 10px;border-radius:7px;background:#F8FAFC;border:1px solid #E2E8F0;color:#64748B;font-weight:600">+ ${subLabel}</button>
            <button class="del" onclick="delSubj('${type}',${subj.id})">✕</button>
          </div>
        </div>
        ${tot?`<div style="background:#F1F5F9;border-radius:99px;height:3px;overflow:hidden"><div class="prog" style="height:100%;width:${pct}%;background:${subj.color};border-radius:99px"></div></div>`:''}
      </div>${rows}</div>`;}).join('');

  const myTasks=S.tasks.filter(t=>t.section===type);
  const trows=myTasks.map(t=>{const d=due(t.date);return`
    <div class="card" style="padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border-left:3px solid ${sec.color};opacity:${t.done?.5:1}">
      <div class="check" onclick="togT(${t.id})" style="width:18px;height:18px;border-radius:5px;border:${t.done?'none':'2px solid '+sec.color};background:${t.done?sec.color:'transparent'}">${t.done?'<span style="color:#fff;font-size:10px;font-weight:700">✓</span>':''}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;text-decoration:${t.done?'line-through':'none'};margin-bottom:2px">${t.title}</div><div style="font-size:11px;color:#94A3B8">${t.cat} · ${fd(t.date)}${t.time?' · '+ft(t.time):''}</div></div>
      <span style="font-size:11px;font-weight:700;color:${d.c};flex-shrink:0">${d.l}</span>
      <span class="bdg" style="flex-shrink:0;background:${t.priority==='High'?'#FEF2F2':t.priority==='Medium'?'#FFFBEB':'#F9FAFB'};color:${t.priority==='High'?'#DC2626':t.priority==='Medium'?'#D97706':'#9CA3AF'}">${t.priority}</span>
      <button class="del" onclick="delT(${t.id})">✕</button>
    </div>`;}).join('');

  return`<div class="fade">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="font-size:11px;font-weight:700;color:${sec.color};letter-spacing:.08em;text-transform:uppercase">Weekly ${subLabel}s</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">Resets every Monday 🔄</div></div>
      <button class="btn" onclick="addSubj('${type}')" style="font-size:12px;padding:7px 13px;border-radius:8px;background:${sec.light};border:1px solid ${sec.color}40;color:${sec.color};font-weight:700">+ Add ${label}</button>
    </div>
    ${subs.length===0?`<div style="text-align:center;padding:40px 0;color:#94A3B8"><div style="font-size:36px;margin-bottom:8px">${sec.icon}</div><div style="font-size:14px;font-weight:600">No ${label.toLowerCase()}s yet</div></div>`:cards}
    <div style="margin-top:22px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.08em;text-transform:uppercase">One-off Tasks</div>
        <button class="btn" onclick="addT('${type}')" style="font-size:11px;padding:5px 10px;border-radius:7px;background:${sec.light};border:1px solid ${sec.color}40;color:${sec.color};font-weight:600">+ Add Task</button>
      </div>
      ${myTasks.length===0?'<div style="text-align:center;padding:14px 0;color:#CBD5E1;font-size:12px">No one-off tasks · all clear 🎉</div>':trows}
    </div>
    ${type==='school'?rCatchup():''}
  </div>`;}

function togSub(type,sj,sb){S.subjects[type]=S.subjects[type].map(s=>s.id===sj?{...s,subs:s.subs.map(sub=>sub.id===sb?{...sub,done:!sub.done}:sub)}:s);renderMain();}
function delSub(type,sj,sb){S.subjects[type]=S.subjects[type].map(s=>s.id===sj?{...s,subs:s.subs.filter(sub=>sub.id!==sb)}:s);renderMain();toast('Removed','info');}
function delSubj(type,id){S.subjects[type]=S.subjects[type].filter(s=>s.id!==id);renderMain();toast('Removed','info');}

// ── Catch-up Classes ──
function rCatchup(){
  const pending=S.catchup.filter(c=>!c.done),done=S.catchup.filter(c=>c.done);
  const row=c=>{const d=due(c.date);return`
    <div class="card" style="padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border-left:3px solid #2563EB;opacity:${c.done?.5:1}">
      <div class="check" onclick="togCU(${c.id})" style="width:18px;height:18px;border-radius:5px;border:${c.done?'none':'2px solid #2563EB'};background:${c.done?'#2563EB':'transparent'}">${c.done?'<span style="color:#fff;font-size:10px;font-weight:700">✓</span>':''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;text-decoration:${c.done?'line-through':'none'};margin-bottom:2px;color:${c.done?'#94A3B8':'#0F172A'}">${c.topic}</div>
        <div style="font-size:11px;color:#94A3B8">${c.subject} · missed ${fd(c.date)}</div>
      </div>
      <span class="bdg" style="background:${c.done?'#F1F5F9':'#FEF2F2'};color:${c.done?'#94A3B8':'#DC2626'};flex-shrink:0">${c.done?'Caught up':'Behind'}</span>
      <button class="del" onclick="delCU(${c.id})">✕</button>
    </div>`;};
  return`
    <div style="margin-top:26px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-size:11px;font-weight:700;color:#DC2626;letter-spacing:.08em;text-transform:uppercase">📖 Catch-up Classes</div>
          <div style="font-size:11px;color:#94A3B8;margin-top:2px">${pending.length} behind · ${done.length} caught up</div>
        </div>
        <button class="btn" onclick="addCU()" style="font-size:11px;padding:5px 10px;border-radius:7px;background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;font-weight:600">+ Add Class</button>
      </div>
      ${S.catchup.length===0?'<div style="text-align:center;padding:16px 0;color:#CBD5E1;font-size:12px">No catch-up classes 🎉 You\'re up to date!</div>':S.catchup.map(row).join('')}
    </div>`;}

function togCU(id){S.catchup=S.catchup.map(c=>c.id===id?{...c,done:!c.done}:c);renderMain();}
function delCU(id){S.catchup=S.catchup.filter(c=>c.id!==id);renderMain();toast('Removed','info');}

function addCU(){modal(`
  <div style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px">Add Catch-up Class</div>
  <div style="margin-bottom:12px"><label class="fl">Subject</label><input class="fi" id="cus" placeholder="e.g. Statistics"/></div>
  <div style="margin-bottom:12px"><label class="fl">Topic / What you missed</label><input class="fi" id="cut" placeholder="e.g. Week 3 – Regression Analysis"/></div>
  <div style="margin-bottom:20px"><label class="fl">Class Date (when it was missed)</label><input class="fi" type="date" id="cud"/></div>
  <div class="ma"><button class="cb" onclick="closeM()">Cancel</button>
  <button class="btn" onclick="saveCU()" style="flex:2;padding:11px;border-radius:9px;border:none;background:#DC2626;color:#fff;font-size:13px;font-weight:700;justify-content:center">Add Catch-up</button></div>`);}

function saveCU(){const s=document.getElementById('cus').value.trim(),t=document.getElementById('cut').value.trim(),d=document.getElementById('cud').value;if(!s||!t||!d)return;S.catchup.push({id:uid(),subject:s,topic:t,date:d,done:false});closeM();renderMain();toast('Catch-up class added!');}
function togT(id){S.tasks=S.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);renderMain();}
function delT(id){S.tasks=S.tasks.filter(t=>t.id!==id);renderMain();toast('Removed','info');}

// ── Personal ──
function rPersonal(){
  const sec=SEC.personal,myT=S.tasks.filter(t=>t.section==='personal');
  const rows=myT.map(t=>{const d=due(t.date);return`
    <div class="card" style="padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border-left:3px solid ${sec.color};opacity:${t.done?.5:1}">
      <div class="check" onclick="togT(${t.id})" style="width:18px;height:18px;border-radius:5px;border:${t.done?'none':'2px solid '+sec.color};background:${t.done?sec.color:'transparent'}">${t.done?'<span style="color:#fff;font-size:10px;font-weight:700">✓</span>':''}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:600;text-decoration:${t.done?'line-through':'none'};margin-bottom:2px">${t.title}</div><div style="font-size:11px;color:#94A3B8">${t.cat} · ${fd(t.date)}${t.time?' · '+ft(t.time):''}</div></div>
      <span style="font-size:11px;font-weight:700;color:${d.c}">${d.l}</span>
      <button class="del" onclick="delT(${t.id})">✕</button>
    </div>`;}).join('');
  return`<div class="fade">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:${sec.color};letter-spacing:.08em;text-transform:uppercase">Personal Tasks</div>
      <button class="btn" onclick="addT('personal')" style="font-size:12px;padding:7px 13px;border-radius:8px;background:${sec.light};border:1px solid ${sec.color}40;color:${sec.color};font-weight:700">+ Add Task</button>
    </div>
    ${myT.length===0?`<div style="text-align:center;padding:40px 0;color:#94A3B8"><div style="font-size:36px;margin-bottom:8px">🌿</div><div style="font-size:14px;font-weight:600">No personal tasks yet</div></div>`:rows}
  </div>`;}

// ── Goals ──
function rGoals(){
  const rows=S.goals.map((g,i)=>{
    const isM=g.type==='milestone',d=isM&&g.targetDate?daysNum(g.targetDate):null,sp=!isM&&g.streakTarget?Math.round(g.streakDone/g.streakTarget*100):0;
    const col=g.done?'#94A3B8':isM?'#0891B2':'#D97706',bc=sp>=100?'#059669':sp>=60?'#D97706':'#0891B2';
    const cd=isM&&g.targetDate&&!g.done?`<div style="display:inline-flex;align-items:center;gap:8px;margin-top:6px;background:${d<=7?'#FEF2F2':d<=30?'#FFFBEB':'#F0FDF4'};border-radius:8px;padding:6px 12px"><span style="font-size:16px">⏳</span><span style="font-size:22px;font-weight:800;color:${d<=7?'#DC2626':d<=30?'#D97706':'#059669'}">${Math.max(0,d)}</span><span style="font-size:11px;color:#6B7280">days to go</span></div>`:'';
    const sb=!isM?`<div style="margin-top:8px"><div style="background:#F1F5F9;border-radius:99px;height:5px;overflow:hidden;margin-bottom:8px"><div class="prog" style="height:100%;width:${Math.min(sp,100)}%;background:${bc};border-radius:99px"></div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#94A3B8">Days done:</span><input type="number" min="0" max="${g.streakTarget}" value="${g.streakDone}" onchange="updStreak(${g.id},this.value)" style="width:50px;padding:4px 8px;border-radius:6px;border:1.5px solid #E2E8F0;font-size:13px;text-align:center;font-family:inherit"/><span style="font-size:11px;color:#94A3B8">/ ${g.streakTarget}</span><span style="font-size:14px">${sp>=100?'🏆':sp>=60?'🔥':'💪'}</span></div></div>`:'';
    return`<div class="card fade" style="padding:18px 20px;border-left:4px solid ${col};opacity:${g.done?.6:1};margin-bottom:10px;animation-delay:${i*.05}s">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div style="display:flex;gap:12px;align-items:flex-start;flex:1">
          <span style="font-size:26px;line-height:1;flex-shrink:0">${g.emoji}</span>
          <div style="flex:1"><div style="font-size:14px;font-weight:700;margin-bottom:2px;text-decoration:${g.done?'line-through':'none'};color:${g.done?'#94A3B8':'#0F172A'}">${g.title}</div>
            <div style="font-size:11px;color:#94A3B8">${isM?(g.targetDate?'Target: '+fd(g.targetDate):'No date set'):`Habit · ${g.streakTarget} day streak`}</div>
            ${cd}${sb}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn" onclick="togGoal(${g.id})" style="font-size:11px;padding:5px 10px;border-radius:7px;font-weight:600;background:${g.done?'#F1F5F9':'#ECFDF5'};border:1px solid ${g.done?'#E2E8F0':'#6EE7B7'};color:${g.done?'#94A3B8':'#059669'}">${g.done?'Undo':'✓ Done'}</button>
          <button class="del" onclick="delGoal(${g.id})">✕</button>
        </div>
      </div></div>`;}).join('');
  return`<div class="fade">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="font-size:11px;font-weight:700;color:#0891B2;letter-spacing:.08em;text-transform:uppercase">My Goals</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">${S.goals.filter(g=>!g.done).length} active · ${S.goals.filter(g=>g.done).length} achieved 🏆</div></div>
      <button class="btn" onclick="addGoal()" style="font-size:12px;padding:7px 13px;border-radius:8px;background:#ECFEFF;border:1px solid #A5F3FC;color:#0891B2;font-weight:700">+ Add Goal</button>
    </div>
    ${S.goals.length===0?'<div style="text-align:center;padding:48px 0;color:#94A3B8"><div style="font-size:40px;margin-bottom:8px">🎯</div><div style="font-size:14px;font-weight:600">No goals yet</div></div>':rows}
  </div>`;}

function togGoal(id){S.goals=S.goals.map(g=>g.id===id?{...g,done:!g.done}:g);renderMain();}
function updStreak(id,v){S.goals=S.goals.map(g=>g.id===id?{...g,streakDone:Math.max(0,Math.min(Number(v),g.streakTarget))}:g);renderMain();}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id);renderMain();toast('Removed','info');}

// ── Modals ──
function closeM(){document.getElementById('mods').innerHTML='';}
function modal(html){document.getElementById('mods').innerHTML=`<div class="overlay" onclick="closeM()"><div class="modal" onclick="event.stopPropagation()">${html}</div></div>`;}

function addW(){M.w={id:null,name:'',unit:'km',planned:'',done:0,day:'Mon',time:'',reminder:true};rWModal();}
function editW(id){M.w={...S.workouts.find(x=>x.id===id)};rWModal();}
function rWModal(){const w=M.w;modal(`
  <div style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px">${w.id?'Edit':'Add'} Workout</div>
  <div style="margin-bottom:12px"><label class="fl">Workout Name</label><input class="fi" id="wn" value="${w.name}" placeholder="e.g. Morning Run"/></div>
  <div class="mr"><div><label class="fl">Unit</label><select class="fi" id="wu">${['km','miles','min'].map(u=>`<option${w.unit===u?' selected':''}>${u}</option>`).join('')}</select></div>
  <div><label class="fl">Weekly Target</label><input class="fi" type="number" id="wp" value="${w.planned}" placeholder="10"/></div></div>
  <div class="mr"><div><label class="fl">Day</label><select class="fi" id="wd">${DAYS.map(d=>`<option${w.day===d?' selected':''}>${d}</option>`).join('')}</select></div>
  <div><label class="fl">Time</label><input class="fi" type="time" id="wt" value="${w.time}"/></div></div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:10px 12px;background:#F8FAFC;border-radius:9px">
    <div class="tgl" id="wr" onclick="togWR()" style="background:${w.reminder?'#059669':'#E2E8F0'}"><div class="tk" style="left:${w.reminder?19:3}px"></div></div>
    <span style="font-size:12px;font-weight:600">Reminder 30 & 5 min before 🔔</span>
  </div>
  <div class="ma"><button class="cb" onclick="closeM()">Cancel</button>
  <button class="btn" onclick="saveW()" style="flex:2;padding:11px;border-radius:9px;border:none;background:#059669;color:#fff;font-size:13px;font-weight:700;justify-content:center">Save Workout</button></div>`);}
function togWR(){M.w.reminder=!M.w.reminder;const t=document.getElementById('wr');t.style.background=M.w.reminder?'#059669':'#E2E8F0';t.querySelector('.tk').style.left=M.w.reminder?'19px':'3px';}
function saveW(){const name=document.getElementById('wn').value.trim(),planned=document.getElementById('wp').value;if(!name||!planned)return;const e={id:M.w.id||uid(),name,unit:document.getElementById('wu').value,planned:Number(planned),done:M.w.id?M.w.done:0,day:document.getElementById('wd').value,time:document.getElementById('wt').value,reminder:M.w.reminder};if(M.w.id)S.workouts=S.workouts.map(w=>w.id===e.id?e:w);else S.workouts.push(e);closeM();scheduleR();render();toast('Workout saved!');}

function addSubj(type){M.st=type;M.sc=SEC[type].color;const label=type==='school'?'Subject':type==='work'?'Department':'Unit';const ph=type==='school'?'e.g. Statistics':type==='work'?'e.g. My Job':'e.g. Reserve Unit';modal(`
  <div style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px">Add ${label}</div>
  <div style="margin-bottom:14px"><label class="fl">Name</label><input class="fi" id="sn" placeholder="${ph}"/></div>
  <div style="margin-bottom:20px"><label class="fl">Color</label>
  <div style="display:flex;gap:8px;flex-wrap:wrap" id="cp">${['#2563EB','#7C3AED','#059669','#D97706','#DC2626','#DB2777','#0891B2','#0F172A'].map(c=>`<div onclick="pickC('${c}')" id="c${c.replace('#','')}" style="width:26px;height:26px;border-radius:99px;background:${c};cursor:pointer;border:3px solid ${c===M.sc?'#0F172A':'transparent'};transition:border .15s"></div>`).join('')}</div></div>
  <div class="ma"><button class="cb" onclick="closeM()">Cancel</button>
  <button class="btn" onclick="saveSubj()" style="flex:2;padding:11px;border-radius:9px;border:none;background:#0F172A;color:#fff;font-size:13px;font-weight:700;justify-content:center">Add</button></div>`);}
function pickC(c){M.sc=c;document.querySelectorAll('#cp>div').forEach(el=>el.style.borderColor='transparent');document.getElementById('c'+c.replace('#','')).style.borderColor='#0F172A';}
function saveSubj(){const name=document.getElementById('sn').value.trim();if(!name)return;S.subjects[M.st].push({id:uid(),name,color:M.sc||'#2563EB',subs:[]});closeM();renderMain();toast('Added!');}

function addSub(type,sj){M.st=type;M.sj=sj;modal(`
  <div style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px">Add Weekly Item</div>
  <div style="margin-bottom:12px"><label class="fl">Title</label><input class="fi" id="st" placeholder="e.g. Problem Set 4"/></div>
  <div class="mr"><div><label class="fl">Due Day</label><select class="fi" id="sd">${DAYS.map((d,i)=>`<option value="${i}">${d}</option>`).join('')}</select></div>
  <div><label class="fl">Due Time</label><input class="fi" type="time" id="stm" value="23:59"/></div></div>
  <div class="ma"><button class="cb" onclick="closeM()">Cancel</button>
  <button class="btn" onclick="saveSub()" style="flex:2;padding:11px;border-radius:9px;border:none;background:#0F172A;color:#fff;font-size:13px;font-weight:700;justify-content:center">Add</button></div>`);}
function saveSub(){const title=document.getElementById('st').value.trim();if(!title)return;S.subjects[M.st]=S.subjects[M.st].map(s=>s.id===M.sj?{...s,subs:[...s.subs,{id:uid(),title,dow:Number(document.getElementById('sd').value),time:document.getElementById('stm').value,done:false}]}:s);closeM();renderMain();toast('Added!');}

function addGoal(){M.gt='milestone';rGModal();}
function rGModal(){const t=M.gt;modal(`
  <div style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px">Add Goal</div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn" onclick="setGT('milestone')" style="flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:700;border:1.5px solid ${t==='milestone'?'#0891B2':'#E2E8F0'};background:${t==='milestone'?'#ECFEFF':'#fff'};color:${t==='milestone'?'#0891B2':'#94A3B8'};justify-content:center">🏅 Milestone</button>
    <button class="btn" onclick="setGT('streak')" style="flex:1;padding:9px;border-radius:9px;font-size:12px;font-weight:700;border:1.5px solid ${t==='streak'?'#0891B2':'#E2E8F0'};background:${t==='streak'?'#ECFEFF':'#fff'};color:${t==='streak'?'#0891B2':'#94A3B8'};justify-content:center">🔥 Habit Streak</button>
  </div>
  <div style="display:grid;grid-template-columns:48px 1fr;gap:8px;margin-bottom:12px">
    <div><label class="fl">Icon</label><input class="fi" id="ge" value="🏅" style="text-align:center;font-size:20px;padding:5px"/></div>
    <div><label class="fl">Title</label><input class="fi" id="gt" placeholder="What do you want to achieve?"/></div>
  </div>
  ${t==='milestone'?'<div style="margin-bottom:20px"><label class="fl">Target Date</label><input class="fi" type="date" id="gd"/></div>':`<div class="mr"><div><label class="fl">Target (days)</label><input class="fi" type="number" id="gtar" value="30"/></div><div><label class="fl">Done so far</label><input class="fi" type="number" id="gdone" value="0"/></div></div>`}
  <div class="ma"><button class="cb" onclick="closeM()">Cancel</button>
  <button class="btn" onclick="saveGoal()" style="flex:2;padding:11px;border-radius:9px;border:none;background:#0F172A;color:#fff;font-size:13px;font-weight:700;justify-content:center">Add Goal</button></div>`);}
function setGT(t){M.gt=t;rGModal();}
function saveGoal(){const title=document.getElementById('gt').value.trim();if(!title)return;S.goals.push({id:uid(),type:M.gt,title,emoji:document.getElementById('ge').value,done:false,targetDate:M.gt==='milestone'?document.getElementById('gd').value:'',streakTarget:M.gt==='streak'?Number(document.getElementById('gtar').value):30,streakDone:M.gt==='streak'?Number(document.getElementById('gdone').value):0});closeM();renderMain();toast('Goal added!');}

function addT(section){M.ts=section;const cats={school:'Catch-up',work:'Task',reserve:'Admin',personal:'Wellness'};modal(`
  <div style="font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px">Add Task</div>
  <div style="margin-bottom:12px"><label class="fl">Title</label><input class="fi" id="tt" placeholder="What do you need to do?"/></div>
  <div class="mr"><div><label class="fl">Date</label><input class="fi" type="date" id="tdate"/></div><div><label class="fl">Time</label><input class="fi" type="time" id="ttime"/></div></div>
  <div style="margin-bottom:12px"><label class="fl">Category</label><input class="fi" id="tcat" value="${cats[section]||'Task'}"/></div>
  <div style="margin-bottom:20px"><label class="fl">Priority</label><select class="fi" id="tpri"><option>High</option><option selected>Medium</option><option>Low</option></select></div>
  <div class="ma"><button class="cb" onclick="closeM()">Cancel</button>
  <button class="btn" onclick="saveT()" style="flex:2;padding:11px;border-radius:9px;border:none;background:#0F172A;color:#fff;font-size:13px;font-weight:700;justify-content:center">Add Task</button></div>`);}
function saveT(){const title=document.getElementById('tt').value.trim(),date=document.getElementById('tdate').value;if(!title||!date)return;S.tasks.push({id:uid(),section:M.ts,title,cat:document.getElementById('tcat').value,date,time:document.getElementById('ttime').value,priority:document.getElementById('tpri').value,done:false});closeM();renderMain();toast('Task added!');}

if(notifPerm==='granted'){document.getElementById('nArea').innerHTML='<span style="font-size:11px;color:#059669;font-weight:600">🔔 On</span>';scheduleR();}
render();
</script>
</body>
</html>
